<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · NuChroma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="signup.css" />
  <link rel="stylesheet" href="signup-form.css" />
  <script>
    (function () {
      const saved = localStorage.getItem("nuchroma-theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
    })();
  </script>
</head>
<body>
  <div class="grain"></div>

  <header class="nav">
    <a href="index.html" class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">NuChroma</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="why.html">Why NuChroma</a>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <a href="signup.html" class="nav-cta">Sign up</a>
    </nav>
  </header>

  <main class="signup-page form-page">
    <div class="signup-orb orb-a" style="background: var(--c3);"></div>
    <div class="signup-orb orb-b" style="background: var(--c4); opacity: 0.35;"></div>

    <div class="form-inner">
      <div class="form-header" style="text-align:center;">
        <span class="eyebrow">Welcome back</span>
        <h1 class="form-title">Log in to <span class="gradient-text">NuChroma.</span></h1>
        <p class="signup-sub">Pick up where you left off — your portfolio, messages, and contracts are waiting.</p>
      </div>

      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" type="email" required placeholder="you@studio.com" autocomplete="email" />
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <input id="password" type="password" required placeholder="Your password" autocomplete="current-password" />
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">
          Log in
        </button>

        <p class="form-footer-note">
          Don't have an account? <a href="signup.html" class="inline-link">Sign up</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-brand">
      <span class="brand-dot"></span>
      <span>NuChroma</span>
    </div>
    <p>© 2026 NuChroma Labs. Made for the people who make things.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="script.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      var btn = document.getElementById("loginBtn");
      btn.textContent = "Logging in…";
      btn.disabled = true;
      setTimeout(function () { window.location.href = "feed.html"; }, 600);
    }
    if (window.gsap) {
      gsap.from(".form-header", { opacity: 0, y: 30, duration: 0.9, ease: "power3.out", delay: 0.1 });
      gsap.from(".auth-form", { opacity: 0, y: 40, duration: 0.9, ease: "power3.out", delay: 0.3 });
    }
  </script>
</body>
</html>
