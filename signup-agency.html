<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NuChroma — Set up an agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="signup.css" />
  <link rel="stylesheet" href="signup-form.css" />
  <script>
    (function () {
      const saved = localStorage.getItem("nuchroma-theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
    })();
  </script>
</head>
<body>
  <div class="grain"></div>

  <header class="nav">
    <a href="index.html" class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">NuChroma</span>
    </a>
    <nav class="nav-links">
      <a href="signup.html">← Back</a>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <main class="signup-page form-page">
    <div class="signup-orb orb-a" style="background: var(--c4);"></div>
    <div class="signup-orb orb-b" style="background: var(--c5); opacity: 0.35;"></div>

    <div class="form-inner">
      <div class="form-header">
        <a href="signup.html" class="back-chip">← Choose path</a>
        <span class="eyebrow" style="margin-top: 20px; display: inline-block;">Studio &amp; agency account</span>
        <h1 class="form-title">Set up your <span class="gradient-text" style="--hue-x: 75%;">agency.</span></h1>
        <p class="signup-sub">A shared workspace for your whole team — manage talent, projects, and your agency's brand in one place.</p>
      </div>

      <form class="auth-form" onsubmit="handleSubmit(event)">
        <div class="form-field">
          <label for="agency-name">Agency name</label>
          <input id="agency-name" type="text" required placeholder="Stellar Studio" />
        </div>

        <div class="form-field">
          <label for="agency-url">Agency website <span class="label-optional">(optional)</span></label>
          <input id="agency-url" type="url" placeholder="https://stellarstudio.com" autocomplete="url" />
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="admin-fname">Your first name</label>
            <input id="admin-fname" type="text" required placeholder="Theo" autocomplete="given-name" />
          </div>
          <div class="form-field">
            <label for="admin-lname">Your last name</label>
            <input id="admin-lname" type="text" required placeholder="Müller" autocomplete="family-name" />
          </div>
        </div>

        <div class="form-field">
          <label for="admin-email">Work email</label>
          <input id="admin-email" type="email" required placeholder="theo@stellarstudio.com" autocomplete="email" />
        </div>

        <div class="form-field">
          <label for="admin-password">Password</label>
          <input id="admin-password" type="password" required placeholder="At least 8 characters" autocomplete="new-password" minlength="8" />
        </div>

        <div class="form-field">
          <label class="field-label-sub">Agency size</label>
          <div class="chip-group" role="group" aria-label="Agency size">
            <button type="button" class="chip" onclick="selectSize(this)">Solo</button>
            <button type="button" class="chip" onclick="selectSize(this)">2–10</button>
            <button type="button" class="chip" onclick="selectSize(this)">11–50</button>
            <button type="button" class="chip" onclick="selectSize(this)">50+</button>
          </div>
        </div>

        <div class="form-field">
          <label class="field-label-sub">Primary discipline</label>
          <div class="chip-group" role="group" aria-label="Primary discipline">
            <button type="button" class="chip chip--blue" onclick="toggleChip(this)">Design</button>
            <button type="button" class="chip chip--blue" onclick="toggleChip(this)">Film &amp; Motion</button>
            <button type="button" class="chip chip--blue" onclick="toggleChip(this)">Photography</button>
            <button type="button" class="chip chip--blue" onclick="toggleChip(this)">Creative direction</button>
            <button type="button" class="chip chip--blue" onclick="toggleChip(this)">Editorial</button>
            <button type="button" class="chip chip--blue" onclick="toggleChip(this)">Mixed</button>
          </div>
        </div>

        <button type="submit" class="submit-btn submit-btn--agency" id="submitBtn">
          Create agency workspace
        </button>

        <p class="form-footer-note">
          Already have an account? <a href="login.html" class="inline-link">Sign in</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-brand">
      <span class="brand-dot"></span>
      <span>NuChroma</span>
    </div>
    <p>© 2026 NuChroma Labs. Made for the people who make things.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="script.js"></script>
  <script>
    function toggleChip(el) {
      el.classList.toggle("chip--active");
    }
    function selectSize(el) {
      el.closest(".chip-group").querySelectorAll(".chip").forEach(c => c.classList.remove("chip--active"));
      el.classList.add("chip--active");
    }
    function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.textContent = "Workspace created ✦";
      btn.disabled = true;
      setTimeout(function () { window.location.href = "feed.html"; }, 750);
    }
    if (window.gsap) {
      gsap.from(".form-header", { opacity: 0, y: 30, duration: 0.9, ease: "power3.out", delay: 0.1 });
      gsap.from(".auth-form", { opacity: 0, y: 40, duration: 0.9, ease: "power3.out", delay: 0.3 });
    }
  </script>
</body>
</html>
